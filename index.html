<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Nota Fiscal</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
    font-family: Arial, sans-serif;
    background:#ccc;
}

.area{
    width:794px;
    margin:auto;
}

.nota{
    width:794px;
    background:#fff;
    padding:20px;
    box-sizing:border-box;
    border:1px solid #000;
}

/* TOPO */
.topo{
    display:flex;
    justify-content:space-between;
    border-bottom:2px solid #000;
    padding-bottom:10px;
    margin-bottom:10px;
}

.empresa{
    font-size:12px;
}

.titulo{
    text-align:right;
    font-size:13px;
}

/* BOX PADRÃO */
.box{
    border:1px solid #000;
    margin-top:10px;
}

.box-title{
    background:#eee;
    padding:4px;
    font-size:12px;
    font-weight:bold;
    border-bottom:1px solid #000;
}

.box-content{
    padding:8px;
    font-size:12px;
}

/* TABELA */
table{
    width:100%;
    border-collapse:collapse;
    font-size:12px;
}

th,td{
    border:1px solid #000;
    padding:5px;
    text-align:center;
}

.total{
    text-align:right;
    font-size:16px;
    margin-top:10px;
    font-weight:bold;
}

.qr{
    margin-top:10px;
}

/* BOTÕES */
.controls{
    margin:20px auto;
    width:300px;
}

input{
    width:100%;
    padding:8px;
    margin:5px 0;
}

button{
    width:100%;
    padding:10px;
    margin-top:5px;
    background:#000;
    color:#fff;
    border:none;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="controls">
<input id="nome" placeholder="Nome">
<input id="cpf" placeholder="CPF">
<input id="endereco" placeholder="Endereço">
<input id="telefone" placeholder="Telefone">
<input id="produto" placeholder="Produto">
<input id="qtd" placeholder="Qtd">
<input id="valor" placeholder="Valor">
<button onclick="gerar()">GERAR</button>
<button onclick="pdf()">BAIXAR PDF</button>
</div>

<div class="area">
<div class="nota" id="nota">

<div class="topo">
<div class="empresa">
<b>AUTO PEÇAS E MECÂNICA BR</b><br>
CNPJ: 01.349.268/0001-04<br>
Rua João Pedro Moreira de Carvalho, 2296<br>
Sinop - MT<br>
Tel: (37) 9841-6044
</div>

<div class="titulo">
<b>NOTA DE VENDA</b><br>
Nº: <span id="numero"></span><br>
Data: <span id="data"></span><br>
Atendente: Felipe
</div>
</div>

<div class="box">
<div class="box-title">DADOS DO CLIENTE</div>
<div class="box-content">
Nome: <span id="c_nome"></span><br>
CPF: <span id="c_cpf"></span><br>
Endereço: <span id="c_endereco"></span><br>
Telefone: <span id="c_tel"></span>
</div>
</div>

<div class="box">
<div class="box-title">PRODUTOS</div>

<table>
<thead>
<tr>
<th>CÓDIGO</th>
<th>DESCRIÇÃO</th>
<th>QTD</th>
<th>V. UNIT</th>
<th>V. TOTAL</th>
</tr>
</thead>

<tbody id="itens"></tbody>

</table>

<div class="total">
TOTAL: R$ <span id="total"></span>
</div>

<div class="qr" id="qrcode"></div>

</div>

</div>
</div>

<script>

function gerarNumero(){
    let n = Math.floor(Math.random()*999999);
    return "BR-2026-" + n;
}

function gerar(){

    let nome = document.getElementById("nome").value;
    let cpf = document.getElementById("cpf").value;
    let endereco = document.getElementById("endereco").value;
    let tel = document.getElementById("telefone").value;

    let produto = document.getElementById("produto").value;
    let qtd = parseFloat(document.getElementById("qtd").value);
    let valor = parseFloat(document.getElementById("valor").value);

    let total = qtd * valor;

    document.getElementById("c_nome").innerText = nome;
    document.getElementById("c_cpf").innerText = cpf;
    document.getElementById("c_endereco").innerText = endereco;
    document.getElementById("c_tel").innerText = tel;

    document.getElementById("numero").innerText = gerarNumero();
    document.getElementById("data").innerText = new Date().toLocaleString("pt-BR");

    document.getElementById("itens").innerHTML = `
    <tr>
        <td>001</td>
        <td>${produto}</td>
        <td>${qtd}</td>
        <td>R$ ${valor.toFixed(2)}</td>
        <td>R$ ${total.toFixed(2)}</td>
    </tr>`;

    document.getElementById("total").innerText = total.toFixed(2);

    document.getElementById("qrcode").innerHTML = "";
    new QRCode(document.getElementById("qrcode"), {
        text: "https://desmanchebr.online",
        width: 80,
        height: 80
    });

}

function pdf(){
    let element = document.getElementById("nota");

    html2pdf().set({
        margin:0,
        filename:"nota.pdf",
        html2canvas:{scale:2},
        jsPDF:{unit:"mm", format:"a4", orientation:"portrait"}
    }).from(element).save();
}

</script>

</body>
</html>
