<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nota Fiscal - DesmancheBR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;margin:0;padding:20px;}
.container{max-width:800px;margin:auto;background:#fff;padding:20px;border:1px solid #ccc;}
h1{text-align:center;color:#d90000;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
table, th, td{border:1px solid #333;}
th, td{padding:8px;text-align:left;}
th{background:#eee;}
label{display:block;margin-top:10px;font-weight:bold;}
input{width:100%;padding:8px;margin-top:4px;border:1px solid #ccc;border-radius:4px;}
button{margin-top:20px;padding:12px;background:#d90000;color:#fff;border:none;border-radius:6px;font-weight:bold;cursor:pointer;width:100%;}
.qr{margin-top:20px;text-align:center;}
</style>
</head>
<body>

<div class="container">
<h1>🧾 Nota Fiscal - DesmancheBR</h1>

<form id="notaForm">
<label>Cliente:</label>
<input type="text" id="cliente" required>

<label>CPF:</label>
<input type="text" id="cpf" required>

<label>Endereço do Cliente:</label>
<input type="text" id="enderecoCliente" required>

<label>Produto:</label>
<input type="text" id="produto" required>

<label>Valor (R$):</label>
<input type="number" id="valor" required>

<label>Número Série:</label>
<input type="text" id="numSerie" required>

<button type="submit">Gerar Nota PDF</button>
</form>

<div class="qr">
<canvas id="qrcode"></canvas>
</div>

</div>

<script>
const { jsPDF } = window.jspdf;

document.getElementById('notaForm').addEventListener('submit', function(e){
    e.preventDefault();

    // Dados da nota
    const cliente = document.getElementById('cliente').value;
    const cpf = document.getElementById('cpf').value;
    const enderecoCliente = document.getElementById('enderecoCliente').value;
    const produto = document.getElementById('produto').value;
    const valor = parseFloat(document.getElementById('valor').value).toFixed(2);
    const numSerie = document.getElementById('numSerie').value;

    const empresa = {
        nome: "DesmancheBR",
        cnpj: "01.349.268/0001-04",
        endereco: "Rua João Pedro Moreira de Carvalho, 2296, Sinop - MT",
        atendente: "Felipe"
    };

    const data = new Date().toLocaleString('pt-BR', {timeZone:'America/Sao_Paulo'});

    // Gerar QR code
    const qr = new QRious({
        element: document.getElementById('qrcode'),
        value: `https://desmanchebr.online/nota?serie=${numSerie}&cliente=${encodeURIComponent(cliente)}`,
        size: 120
    });

    // Gerar PDF
    const doc = new jsPDF();
    doc.setFontSize(12);
    doc.text(`${empresa.nome}`, 10, 10);
    doc.text(`CNPJ: ${empresa.cnpj}`, 10, 16);
    doc.text(`${empresa.endereco}`, 10, 22);
    doc.text(`Atendente: ${empresa.atendente}`, 10, 28);
    doc.text(`Data/Hora: ${data}`, 10, 34);
    doc.text(`Número Série: ${numSerie}`, 10, 40);

    doc.setFontSize(14);
    doc.text("Dados do Cliente", 10, 50);
    doc.setFontSize(12);
    doc.text(`Nome: ${cliente}`, 10, 56);
    doc.text(`CPF: ${cpf}`, 10, 62);
    doc.text(`Endereço: ${enderecoCliente}`, 10, 68);

    doc.setFontSize(14);
    doc.text("Produto", 10, 78);
    doc.setFontSize(12);
    doc.autoTable({
        startY: 82,
        head: [['Descrição', 'Valor (R$)']],
        body: [[produto, valor]],
        theme: 'grid'
    });

    // Adicionar QR code
    const qrCanvas = document.getElementById('qrcode');
    const imgData = qrCanvas.toDataURL("image/png");
    doc.addImage(imgData, 'PNG', 150, 10, 40, 40);

    doc.save(`Nota_${numSerie}.pdf`);
});
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</body>
</html>
