<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Nota Fiscal - DesmancheBR</title>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<!-- QRCode -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;padding:20px;}
h1{text-align:center;color:#d90000;margin-bottom:20px;}
.formulario{background:#fff;padding:20px;border-radius:8px;max-width:600px;margin:auto;box-shadow:0 0 10px rgba(0,0,0,0.1);}
input, select{width:100%;padding:10px;margin:8px 0;border-radius:6px;border:1px solid #ccc;}
button{background:#d90000;color:#fff;padding:12px;border:none;width:100%;border-radius:6px;font-weight:bold;margin-top:10px;cursor:pointer;}
button:hover{background:#b20000;}
</style>
</head>
<body>

<h1>Gerador de Nota Fiscal - DesmancheBR</h1>

<div class="formulario">
<form id="notaForm">
  <label>Nome do Cliente:</label>
  <input type="text" id="cliente" placeholder="Ex: Paulo" required>

  <label>CPF do Cliente:</label>
  <input type="text" id="cpf" placeholder="Ex: 123.456.789-00" required>

  <label>Endereço do Cliente:</label>
  <input type="text" id="endereco" placeholder="Ex: Rua Exemplo, 123" required>

  <label>Produto:</label>
  <input type="text" id="produto" placeholder="Ex: Banco" required>

  <label>Quantidade:</label>
  <input type="number" id="quantidade" value="1" min="1" required>

  <label>Valor Unitário (R$):</label>
  <input type="number" id="valor" placeholder="Ex: 600" required>

  <button type="submit">Gerar Nota Fiscal PDF</button>
</form>
</div>

<script>
const { jsPDF } = window.jspdf;

document.getElementById('notaForm').addEventListener('submit', function(e){
    e.preventDefault();

    const cliente = document.getElementById('cliente').value;
    const cpf = document.getElementById('cpf').value;
    const endereco = document.getElementById('endereco').value;
    const produto = document.getElementById('produto').value;
    const quantidade = Number(document.getElementById('quantidade').value);
    const valor = Number(document.getElementById('valor').value);
    const total = quantidade * valor;

    // Dados da empresa
    const empresa = "DesmancheBR";
    const cnpj = "01.349.268/0001-04";
    const enderecoEmpresa = "Rua João Pedro Moreira de Carvalho, 2296, Setor Industrial, Sinop - MT";
    const atendente = "Felipe";
    const numeroSerie = "BR-" + Date.now();

    // Data e hora Brasil
    const data = new Date().toLocaleString("pt-BR", { timeZone: "America/Sao_Paulo" });

    const doc = new jsPDF();

    // Título
    doc.setFontSize(18);
    doc.text("🧾 COMPROVANTE DE VENDA", 105, 15, null, null, "center");

    doc.setFontSize(10);
    doc.text(`Empresa: ${empresa}`, 14, 30);
    doc.text(`CNPJ: ${cnpj}`, 14, 36);
    doc.text(`Endereço: ${enderecoEmpresa}`, 14, 42);

    doc.text(`Nº: ${numeroSerie}`, 150, 30);
    doc.text(`Data/Hora: ${data}`, 150, 36);
    doc.text(`Atendente: ${atendente}`, 150, 42);

    doc.setLineWidth(0.5);
    doc.line(14, 48, 196, 48); // Linha horizontal

    doc.setFontSize(12);
    doc.text(`Cliente: ${cliente}`, 14, 55);
    doc.text(`CPF: ${cpf}`, 14, 61);
    doc.text(`Endereço: ${endereco}`, 14, 67);

    doc.line(14, 72, 196, 72); // Linha horizontal

    // Tabela de produtos
    doc.setFontSize(11);
    doc.text("Produto", 14, 78);
    doc.text("Qtd", 120, 78);
    doc.text("Valor Unit.", 150, 78);
    doc.text("Total", 180, 78);

    doc.line(14, 80, 196, 80);

    doc.text(produto, 14, 88);
    doc.text(quantidade.toString(), 125, 88);
    doc.text("R$ " + valor.toFixed(2), 150, 88);
    doc.text("R$ " + total.toFixed(2), 180, 88);

    doc.line(14, 95, 196, 95);

    doc.setFontSize(12);
    doc.text(`TOTAL: R$ ${total.toFixed(2)}`, 14, 105);

    // QR Code para verificação
    const qr = new QRCode(document.createElement("div"), {
        text: `https://desmanchebr.online/nota/${numeroSerie}`,
        width: 50,
        height: 50,
        correctLevel : QRCode.CorrectLevel.H
    });

    const qrImg = qr._oDrawing._elCanvas.toDataURL("image/png");
    doc.addImage(qrImg, "PNG", 160, 110, 40, 40);

    doc.save(`NotaFiscal-${numeroSerie}.pdf`);
});
</script>

</body>
</html>
