<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emissão de Nota Fiscal - DesmancheBR</title>

<style>
body {font-family: "Courier New", Courier, monospace; background:#f4f4f4; padding:20px;}
.container {max-width:800px; margin:auto; background:#fff; padding:20px; border:1px solid #ccc;}
h2 {text-align:center; margin-bottom:20px;}
table {width:100%; border-collapse: collapse; margin-bottom:20px;}
table, th, td {border:1px solid #000;}
th, td {padding:8px; text-align:left;}
th {background:#eee;}
input {padding:6px; margin:5px 0; width:100%; box-sizing:border-box;}
button {padding:10px 15px; margin:5px; background:#d90000; color:#fff; border:none; border-radius:4px; cursor:pointer;}
.qr {text-align:center; margin-top:15px;}
</style>

<!-- Bibliotecas -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<div class="container">
<h2>🧾 Emissão de Nota Fiscal</h2>

<label>Nome do Cliente:</label>
<input type="text" id="cliente" placeholder="Ex: Paulo" required>
<label>CPF/CNPJ:</label>
<input type="text" id="cpf" placeholder="Ex: 123.456.789-00" required>
<label>Endereço do Cliente:</label>
<input type="text" id="endereco" placeholder="Rua ABC, 123, Cidade" required>

<h3>Produtos</h3>
<div id="produtos"></div>
<button onclick="adicionarProduto()">Adicionar Produto</button>

<div>
<button onclick="gerarNota()">Gerar Nota</button>
<button onclick="baixarPDF()">Baixar PDF</button>
<button onclick="compartilharWhats()">Compartilhar WhatsApp</button>
</div>

<div id="nota" style="margin-top:20px; padding:15px; border:1px dashed #ccc;"></div>
<div class="qr" id="qrcode"></div>
</div>

<script>
const empresa = {
  nome: "DesmancheBR",
  cnpj: "01.349.268/0001-04",
  endereco: "Rua João Pedro Moreira de Carvalho, 2296, Sinop - MT",
  atendente: "Felipe"
};

let listaProdutos = [];

function adicionarProduto(){
  const div = document.createElement('div');
  div.innerHTML = `
    <input placeholder="Produto" class="produto" required>
    <input placeholder="Quantidade" type="number" class="quantidade" value="1" required>
    <input placeholder="Valor Unitário (R$)" type="number" class="valor" step="0.01" value="0" required>
  `;
  document.getElementById('produtos').appendChild(div);
}

function gerarNota(){
  const cliente = document.getElementById('cliente').value;
  const cpf = document.getElementById('cpf').value;
  const endereco = document.getElementById('endereco').value;

  listaProdutos = [];
  const nomes = document.querySelectorAll('.produto');
  const quant = document.querySelectorAll('.quantidade');
  const valores = document.querySelectorAll('.valor');

  for(let i=0;i<nomes.length;i++){
    listaProdutos.push({
      nome: nomes[i].value,
      quantidade: parseFloat(quant[i].value),
      valor: parseFloat(valores[i].value)
    });
  }

  const data = new Date().toLocaleString("pt-BR", {timeZone:"America/Sao_Paulo"});
  const numero = "BR-"+Math.floor(Math.random()*90000+10000);

  let html = `<h3>🧾 COMPROVANTE DE VENDA</h3>
  <p>Nº: ${numero}<br>
  Cliente: ${cliente}<br>
  CPF/CNPJ: ${cpf}<br>
  Endereço: ${endereco}<br>
  Atendente: ${empresa.atendente}<br>
  Data: ${data}</p>
  <p>Empresa: ${empresa.nome}<br>
  CNPJ: ${empresa.cnpj}<br>
  Endereço: ${empresa.endereco}</p>
  <table>
  <tr><th>Produto</th><th>Qtd</th><th>Valor Unitário</th><th>Total</th></tr>`;

  let totalNota = 0;
  listaProdutos.forEach(p=>{
    const total = p.quantidade*p.valor;
    totalNota += total;
    html += `<tr>
      <td>${p.nome}</td>
      <td>${p.quantidade}</td>
      <td>R$ ${p.valor.toFixed(2)}</td>
      <td>R$ ${total.toFixed(2)}</td>
    </tr>`;
  });

  html += `</table><p style="text-align:right; font-weight:bold;">TOTAL: R$ ${totalNota.toFixed(2)}</p>`;

  document.getElementById('nota').innerHTML = html;

  document.getElementById('qrcode').innerHTML = "";
  new QRCode(document.getElementById("qrcode"), numero);
}

// Baixar PDF usando html2canvas + jsPDF
async function baixarPDF(){
  const { jsPDF } = window.jspdf;
  const notaDiv = document.getElementById('nota');
  const canvas = await html2canvas(notaDiv);
  const imgData = canvas.toDataURL('image/png');
  const pdf = new jsPDF('p','pt','a4');
  const imgProps = pdf.getImageProperties(imgData);
  const pdfWidth = pdf.internal.pageSize.getWidth();
  const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
  pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
  pdf.save('nota_fiscal.pdf');
}

// Compartilhar WhatsApp
function compartilharWhats(){
  const numero = "+5511944690732";
  const nota = document.getElementById('nota').innerText;
  const msg = encodeURIComponent(nota);
  window.open(`https://wa.me/${numero}?text=${msg}`, "_blank");
}
</script>
</body>
</html>
