<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Comprovante de Venda</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- PDF LIB -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<!-- QR CODE -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
font-family:Arial;
background:#f0f0f0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

input{
padding:8px;
margin:5px;
width:100%;
}

button{
padding:10px;
margin-top:10px;
width:100%;
background:#111;
color:#fff;
border:none;
cursor:pointer;
}

.nota{
background:#fff;
padding:20px;
margin-top:20px;
border:1px solid #000;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td,th{
border:1px solid #000;
padding:6px;
font-size:13px;
}

.header{
display:flex;
justify-content:space-between;
font-size:13px;
margin-bottom:10px;
}

.total{
text-align:right;
font-weight:bold;
margin-top:10px;
}

#qrcode{
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Gerar Comprovante</h2>

<input id="nome" placeholder="Nome do cliente">
<input id="cpf" placeholder="CPF">
<input id="endereco" placeholder="Endereço">

<input id="produto" placeholder="Produto">
<input id="valor" placeholder="Valor">

<button onclick="addProduto()">Adicionar Produto</button>
<button onclick="gerarNota()">Gerar</button>

<div id="nota" class="nota" style="display:none;"></div>

<button onclick="gerarPDF()">Baixar PDF</button>
<button onclick="enviarWhats()">Enviar WhatsApp</button>

</div>

<script>

let produtos = [];

function addProduto(){
let nome = document.getElementById('produto').value;
let valor = parseFloat(document.getElementById('valor').value);

if(!nome || !valor) return;

produtos.push({nome, valor});
document.getElementById('produto').value='';
document.getElementById('valor').value='';
}

function gerarNota(){

let nome = document.getElementById('nome').value;
let cpf = document.getElementById('cpf').value;
let endereco = document.getElementById('endereco').value;

let numero = "BR-" + Date.now();

let data = new Date().toLocaleString('pt-BR', {timeZone:'America/Sao_Paulo'});

let total = produtos.reduce((a,b)=>a+b.valor,0);

let html = `
<div class="header">
<div>
<strong>Auto Peças e Mecânica BR</strong><br>
CNPJ: 01.349.268/0001-04<br>
Endereço: Sinop - MT
</div>
<div>
Nº: ${numero}<br>
Data: ${data}
</div>
</div>

<hr>

<strong>Cliente:</strong> ${nome}<br>
<strong>CPF:</strong> ${cpf}<br>
<strong>Endereço:</strong> ${endereco}<br><br>

<table>
<tr>
<th>Produto</th>
<th>Valor</th>
</tr>
`;

produtos.forEach(p=>{
html += `<tr><td>${p.nome}</td><td>R$ ${p.valor.toFixed(2)}</td></tr>`;
});

html += `</table>

<div class="total">
TOTAL: R$ ${total.toFixed(2)}
</div>

<br>
Atendente: Felipe
<div id="qrcode"></div>
`;

let nota = document.getElementById('nota');
nota.innerHTML = html;
nota.style.display='block';

// QR CODE
let qr = new QRCode(document.getElementById("qrcode"), {
text: numero,
width: 80,
height: 80
});
}

function gerarPDF(){
let element = document.getElementById('nota');

html2pdf().set({
margin: 5,
filename: 'comprovante.pdf',
html2canvas: { scale: 2 },
jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
}).from(element).save();
}

function enviarWhats(){

let texto = document.getElementById('nota').innerText;

let url = "https://wa.me/5511944690732?text=" + encodeURIComponent(texto);

window.open(url, '_blank');
}

</script>

</body>
</html>
