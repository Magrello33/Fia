<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador de Nota Fiscal</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
    font-family: Arial;
    background:#111;
    color:#fff;
    text-align:center;
}

.container{
    max-width:500px;
    margin:auto;
    background:#1c1c1c;
    padding:20px;
    border-radius:10px;
}

input, button{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:5px;
}

button{
    background:#00c853;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

#nota{
    display:none;
    background:#fff;
    color:#000;
    padding:20px;
}
</style>
</head>

<body>

<div class="container">
<h2>GERADOR DE NOTA</h2>

<input id="nome" placeholder="Nome cliente">
<input id="cpf" placeholder="CPF">
<input id="endereco" placeholder="Endereço">
<input id="produto" placeholder="Produto">
<input id="valor" placeholder="Valor">

<button onclick="addProduto()">Adicionar Produto</button>
<button onclick="gerarNota()">Gerar Nota</button>
<button onclick="baixarPDF()">Baixar PDF</button>
<button onclick="enviarWhats()">Enviar WhatsApp</button>
</div>

<div id="nota"></div>

<script>
let produtos = [];

function addProduto(){
    let nome = document.getElementById("produto").value;
    let valor = parseFloat(document.getElementById("valor").value);

    if(!nome || !valor) return alert("Preencha produto e valor");

    produtos.push({nome, valor});

    document.getElementById("produto").value="";
    document.getElementById("valor").value="";

    alert("Produto adicionado");
}

function gerarNota(){

    let nome = document.getElementById("nome").value;
    let cpf = document.getElementById("cpf").value;
    let endereco = document.getElementById("endereco").value;

    let total = produtos.reduce((t,p)=>t+p.valor,0);

    let numero = Math.floor(Math.random()*100000);
    let data = new Date().toLocaleString();

    let html = `
    <div style="width:300px; margin:auto; font-family:Courier New;">

    <div style="text-align:center; font-weight:bold;">
    AUTO PEÇAS BR<br>
    CNPJ: 01.349.268/0001-04<br>
    </div>

    <hr>

    NFC-e Nº ${numero}<br>
    ${data}

    <hr>

    CLIENTE: ${nome}<br>
    CPF: ${cpf}<br>
    ${endereco}

    <hr>

    `;

    produtos.forEach((p,i)=>{
        html += `${i+1} - ${p.nome} R$ ${p.valor.toFixed(2)}<br>`;
    });

    html += `

    <hr>

    <b>TOTAL R$ ${total.toFixed(2)}</b>

    <hr>

    Documento sem valor fiscal

    </div>
    `;

    let nota = document.getElementById("nota");
    nota.innerHTML = html;
    nota.style.display = "block";
}

function baixarPDF(){

    let element = document.getElementById("nota");

    let opt = {
        margin: 5,
        filename: 'nota.pdf',
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { scale: 3 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(element).save();
}

function enviarWhats(){

    let texto = "Segue sua nota fiscal!";
    let url = "https://wa.me/?text=" + encodeURIComponent(texto);

    window.open(url, '_blank');
}
</script>

</body>
</html>
