<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Emissão de Nota</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
    font-family: Arial;
    background:#eee;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.box{
    background:#fff;
    padding:15px;
    margin-bottom:10px;
    border:1px solid #000;
}

h2{
    margin:0 0 10px;
    font-size:16px;
    border-bottom:1px solid #000;
}

input{
    width:100%;
    padding:6px;
    margin:4px 0;
    border:1px solid #ccc;
}

button{
    padding:12px;
    width:100%;
    background:#000;
    color:#fff;
    border:none;
    margin-top:10px;
    cursor:pointer;
}

.nota{
    background:#fff;
    padding:20px;
    border:2px solid #000;
}

.header{
    display:flex;
    justify-content:space-between;
    font-size:14px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
    font-size:13px;
}

th,td{
    border:1px solid #000;
    padding:6px;
    text-align:center;
}

.total{
    text-align:right;
    margin-top:10px;
    font-weight:bold;
}

.qr{
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- FORM -->
<div class="box">
<h2>Dados do Cliente</h2>
<input id="nome" placeholder="Nome">
<input id="cpf" placeholder="CPF">
<input id="endereco" placeholder="Endereço">
<input id="telefone" placeholder="Telefone">
</div>

<div class="box">
<h2>Produto</h2>
<input id="produto" placeholder="Descrição">
<input id="qtd" placeholder="Quantidade">
<input id="valor" placeholder="Valor Unitário">
<button onclick="gerarNota()">GERAR NOTA</button>
<button onclick="gerarPDF()">BAIXAR PDF</button>
</div>

<!-- NOTA -->
<div id="nota" class="nota">

<div class="header">
<div>
<b>Auto Peças e Mecânica BR</b><br>
CNPJ: 01.349.268/0001-04<br>
Rua João Pedro Moreira de Carvalho, 2296<br>
Sinop - MT<br>
Tel: (37) 9841-6044
</div>

<div>
<b>NOTA DE VENDA</b><br>
Nº: <span id="numero"></span><br>
Data: <span id="data"></span><br>
Atendente: Felipe
</div>
</div>

<hr>

<div class="box">
<h2>Dados do Cliente</h2>
Nome: <span id="c_nome"></span><br>
CPF: <span id="c_cpf"></span><br>
Endereço: <span id="c_endereco"></span><br>
Telefone: <span id="c_tel"></span>
</div>

<div class="box">
<h2>Itens</h2>

<table>
<thead>
<tr>
<th>Código</th>
<th>Descrição</th>
<th>Qtd</th>
<th>Valor Unit.</th>
<th>Total</th>
</tr>
</thead>

<tbody id="itens"></tbody>
</table>

<div class="total">
TOTAL: R$ <span id="total"></span>
</div>

<div class="qr" id="qrcode"></div>

</div>

</div>

</div>

<script>

function gerarNumero(){
    let ano = new Date().getFullYear();
    let num = Math.floor(Math.random()*999999);
    return `BR-${ano}-${num}`;
}

function gerarNota(){

    let nome = document.getElementById('nome').value;
    let cpf = document.getElementById('cpf').value;
    let endereco = document.getElementById('endereco').value;
    let telefone = document.getElementById('telefone').value;

    let produto = document.getElementById('produto').value;
    let qtd = parseFloat(document.getElementById('qtd').value);
    let valor = parseFloat(document.getElementById('valor').value);

    let total = qtd * valor;

    document.getElementById('c_nome').innerText = nome;
    document.getElementById('c_cpf').innerText = cpf;
    document.getElementById('c_endereco').innerText = endereco;
    document.getElementById('c_tel').innerText = telefone;

    document.getElementById('numero').innerText = gerarNumero();

    let data = new Date().toLocaleString('pt-BR');
    document.getElementById('data').innerText = data;

    document.getElementById('itens').innerHTML = `
        <tr>
            <td>001</td>
            <td>${produto}</td>
            <td>${qtd}</td>
            <td>R$ ${valor.toFixed(2)}</td>
            <td>R$ ${total.toFixed(2)}</td>
        </tr>
    `;

    document.getElementById('total').innerText = total.toFixed(2);

    // QR CODE
    document.getElementById("qrcode").innerHTML = "";
    new QRCode(document.getElementById("qrcode"), {
        text: "https://desmanchebr.online/verificar?nota=" + document.getElementById('numero').innerText,
        width: 80,
        height: 80
    });

}

function gerarPDF(){
    let element = document.getElementById('nota');

    html2pdf().set({
        margin:5,
        filename:'nota.pdf',
        image:{type:'jpeg', quality:1},
        html2canvas:{scale:2},
        jsPDF:{unit:'mm', format:'a4', orientation:'portrait'}
    }).from(element).save();
}

</script>

</body>
</html>
