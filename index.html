<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerador de Nota Fiscal</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
    font-family: monospace;
    background:#eee;
    padding:20px;
}

.container{
    max-width:400px;
    margin:auto;
    background:#fff;
    padding:15px;
    border-radius:8px;
}

input{
    width:100%;
    margin:5px 0;
    padding:8px;
}

button{
    width:100%;
    padding:12px;
    background:#000;
    color:#fff;
    border:none;
    margin-top:10px;
}

#nota{
    display:none;
    width:300px;
    margin:auto;
    background:#fff;
    padding:10px;
    font-size:12px;
}

.center{text-align:center;}
.line{border-top:1px dashed #000;margin:5px 0;}

</style>
</head>

<body>

<div class="container">

<h3>Gerar Nota</h3>

<input id="cliente" placeholder="Nome Cliente">
<input id="cpf" placeholder="CPF">
<input id="endereco" placeholder="Endereço">
<input id="telefone" placeholder="Telefone">

<input id="produto" placeholder="Produto">
<input id="valor" placeholder="Valor">

<button onclick="gerarNota()">Gerar Nota</button>
<button onclick="baixarPDF()">Baixar PDF</button>

</div>

<div id="nota">

<div class="center">
<b>AUTO PEÇAS BR</b><br>
CNPJ: 01.349.268/0001-04<br>
Endereço: Sinop - MT<br>
Telefone: (37) 9841-6044
</div>

<div class="line"></div>

<div class="center">
NFC-e Nº <span id="numero"></span><br>
<span id="data"></span>
</div>

<div class="line"></div>

Cliente: <span id="nCliente"></span><br>
CPF: <span id="nCpf"></span><br>
End: <span id="nEnd"></span><br>
Tel: <span id="nTel"></span>

<div class="line"></div>

1 - <span id="nProduto"></span><br>
R$ <span id="nValor"></span>

<div class="line"></div>

<div class="center">
<b>TOTAL R$ <span id="nTotal"></span></b>
</div>

<div class="line"></div>

Atendente: Felipe

<div id="qrcode" class="center"></div>

<div class="center">
Obrigado pela preferência
</div>

</div>

<script>

function gerarNota(){

let numero = Math.floor(Math.random()*999999);

document.getElementById("numero").innerText = numero;

let data = new Date().toLocaleString("pt-BR");
document.getElementById("data").innerText = data;

document.getElementById("nCliente").innerText = document.getElementById("cliente").value;
document.getElementById("nCpf").innerText = document.getElementById("cpf").value;
document.getElementById("nEnd").innerText = document.getElementById("endereco").value;
document.getElementById("nTel").innerText = document.getElementById("telefone").value;

document.getElementById("nProduto").innerText = document.getElementById("produto").value;

let valor = document.getElementById("valor").value;
document.getElementById("nValor").innerText = valor;
document.getElementById("nTotal").innerText = valor;

document.getElementById("nota").style.display = "block";

// QR CODE
document.getElementById("qrcode").innerHTML = "";
new QRCode(document.getElementById("qrcode"), {
    text: "Nota "+numero,
    width:80,
    height:80
});

}

async function baixarPDF(){

const { jsPDF } = window.jspdf;

let doc = new jsPDF({
    orientation: "portrait",
    unit: "mm",
    format: [80, 200]
});

let texto = document.getElementById("nota").innerText;

let linhas = doc.splitTextToSize(texto, 70);

doc.setFont("courier");
doc.setFontSize(8);

doc.text(linhas, 5, 5);

doc.save("nota_fiscal.pdf");

}

</script>

</body>
</html>
