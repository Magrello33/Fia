<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emissão de Comprovante</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f5f5f5;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:#fff;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#25D366;
color:#fff;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1ebe5d;
}

.nota{
display:none;
margin-top:20px;
background:#fff;
padding:15px;
border:1px solid #000;
font-size:14px;
}

.linha{
display:flex;
justify-content:space-between;
margin-bottom:5px;
}

hr{
border:none;
border-top:1px dashed #000;
margin:10px 0;
}
</style>
</head>

<body>

<div class="container">
<h2>Emissão de Comprovante</h2>

<input id="nome" placeholder="Nome do Cliente">
<input id="cpf" placeholder="CPF do Cliente">
<input id="enderecoCliente" placeholder="Endereço do Cliente">
<input id="produto" placeholder="Produto">
<input id="valor" placeholder="Valor (R$)">

<button onclick="gerarEEnviar()">Emitir e Enviar no WhatsApp</button>

<div id="nota" class="nota"></div>
</div>

<script>

function gerarEEnviar(){

let nome = document.getElementById("nome").value;
let cpf = document.getElementById("cpf").value;
let enderecoCliente = document.getElementById("enderecoCliente").value;
let produto = document.getElementById("produto").value;
let valor = document.getElementById("valor").value;

let numero = "BR-" + Math.floor(Math.random()*100000);
let data = new Date().toLocaleString();

let empresa = "AUTO PEÇAS E MECÂNICA BR";
let cnpj = "01.349.268/0001-04";
let enderecoEmpresa = "Rua João Pedro Moreira de Carvalho, 2296 - Sinop MT";
let atendente = "Felipe";

let notaHTML = `
<strong>${empresa}</strong><br>
CNPJ: ${cnpj}<br>
${enderecoEmpresa}
<hr>
<strong>COMPROVANTE DE VENDA</strong>
<hr>

<div class="linha"><span>Nº:</span><span>${numero}</span></div>
<div class="linha"><span>Data:</span><span>${data}</span></div>

<hr>

<strong>CLIENTE</strong><br>
${nome}<br>
CPF: ${cpf}<br>
${enderecoCliente}

<hr>

<strong>PRODUTO</strong><br>
${produto}

<hr>

<div class="linha"><span>Valor:</span><span>R$ ${valor}</span></div>

<hr>

Atendente: ${atendente}<br>
Documento sem valor fiscal<br>
`;

document.getElementById("nota").style.display="block";
document.getElementById("nota").innerHTML = notaHTML;


// TEXTO PARA WHATSAPP
let texto =
`AUTO PEÇAS E MECÂNICA BR
CNPJ: 01.349.268/0001-04

COMPROVANTE DE VENDA

Nº: ${numero}
Data: ${data}

CLIENTE:
${nome}
CPF: ${cpf}
${enderecoCliente}

PRODUTO:
${produto}

VALOR: R$ ${valor}

Atendente: ${atendente}
Documento sem valor fiscal`;

// SEU NÚMERO AQUI
let url = "https://wa.me/5511944690732?text=" + encodeURIComponent(texto);

window.open(url, "_blank");

}

</script>

</body>
</html>
